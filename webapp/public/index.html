<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostgreSQL + OpenTelemetry Workshop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <span>Мониторинг PostgreSQL</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
      </div>
      <ul id="nav-list" class="nav-list"></ul>

    </nav>

    <!-- Main content -->
    <main id="main">
      <!-- Top toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="detail-toggle" id="detail-toggle" style="display:none">
            <button class="toggle-btn active" data-mode="short" onclick="setContentMode('short')">Кратко</button>
            <button class="toggle-btn" data-mode="detailed" onclick="setContentMode('detailed')">Подробно</button>
          </div>
        </div>
        <div class="toolbar-right">
          <div id="status-indicator" class="status-indicator">
            <span class="status-text" id="status-text">Проверка...</span>
            <div class="status-dot checking" id="status-dot"></div>
            <div class="status-tooltip" id="status-tooltip">
              <div class="status-tooltip-list" id="status-tooltip-list"></div>
              <button class="status-tooltip-refresh" onclick="checkServices()">Обновить</button>
            </div>
          </div>
        </div>
      </div>

      <div class="content-wrapper">
        <!-- Context actions panel (left gutter) -->
        <div class="context-panel" id="context-panel"></div>

        <div id="content" class="content"></div>
      </div>

      <!-- Bottom navigation -->
      <div class="bottom-nav">
        <div class="bottom-nav-row">
          <button id="btn-prev" class="nav-btn nav-btn-prev" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            <span>Назад</span>
          </button>
          <div class="step-indicator">
            <span id="step-current">1</span> / <span id="step-total">1</span>
          </div>
          <button id="btn-next" class="nav-btn nav-btn-next">
            <span>Далее</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
        <div class="bottom-progress-bar"><div class="bottom-progress-fill" id="progress-fill"></div></div>
      </div>
    </main>
  </div>

  <!-- Flyout panel for file viewing -->
  <div class="flyout-overlay" id="flyout-overlay" onclick="closeFlyout()">
    <div class="flyout-panel" onclick="event.stopPropagation()">
      <div class="flyout-header">
        <span class="flyout-title" id="flyout-title"></span>
        <button class="flyout-close" onclick="closeFlyout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="flyout-body" id="flyout-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
