# Step 1: Collect PostgreSQL and OS metrics, expose via Prometheus exporter for verification.
#
# Receivers: postgrespro (PG metrics), hostmetrics (OS metrics)
# Exporters: prometheus (for verification at :8889/metrics)
# Processors: memory_limiter, batch

receivers:
  postgrespro:
    transport: tcp
    endpoint: postgres:5432
    database: postgres
    username: postgres
    password: ${env:POSTGRESQL_PASSWORD}
    collection_interval: 15s
    initial_delay: 1s
    max_threads: 3
    connection_pool:
      max_idle_time: 10m
      max_lifetime: 10m
      connect_timeout: 15s
      max_open: 5
    plugins:
      activity:
        enabled: true
      archiver:
        enabled: true
      bgwriter:
        enabled: true
      cache:
        enabled: true
      databases:
        enabled: true
      health:
        enabled: true
      io:
        enabled: true
      locks:
        enabled: true
      replication:
        enabled: true
      tablespaces:
        enabled: true
      version:
        enabled: true
      wal:
        enabled: true

  hostmetrics:
    collection_interval: 15s
    initial_delay: 1s
    scrapers:
      cpu:
      disk:
      filesystem:
      load:
      memory:
      network:
      paging:
      processes:

exporters:
  prometheus:
    endpoint: :8889
    send_timestamps: true

processors:
  memory_limiter/metrics:
    check_interval: 1s
    limit_mib: 512
  batch/metrics:
    send_batch_size: 8192
    timeout: 10s

service:
  telemetry:
    logs:
      level: info
      encoding: json
      output_paths: ["stderr"]
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    metrics:
      receivers:
        - postgrespro
        - hostmetrics
      processors:
        - memory_limiter/metrics
        - batch/metrics
      exporters:
        - prometheus
