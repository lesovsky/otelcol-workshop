# Step 3 (final): Add filelog receiver for PostgreSQL JSON logs, send to VictoriaLogs.
#
# Changes from step2:
#   + filelog receiver (PostgreSQL JSON logs)
#   + otlphttp/victorialogs exporter -> VictoriaLogs
#   + resource processor (service.name, service.instance.id)
#   + attributes/convert processor (query_id -> string)
#   + batch/logs processor
#   + logs pipeline
#
# Receivers: postgrespro (PG metrics), hostmetrics (OS metrics), filelog (PG logs)
# Exporters: prometheus (verification), otlphttp (-> VictoriaMetrics), otlphttp/victorialogs (-> VictoriaLogs)
# Processors: memory_limiter, batch/logs, resource, attributes/convert

receivers:
  postgrespro:
    transport: tcp
    endpoint: postgres:5432
    database: postgres
    username: postgres
    password: ${env:POSTGRESQL_PASSWORD}
    collection_interval: 15s
    initial_delay: 1s
    max_threads: 3
    connection_pool:
      max_idle_time: 10m
      max_lifetime: 10m
      connect_timeout: 15s
      max_open: 5
    plugins:
      activity:
        enabled: true
      archiver:
        enabled: true
      bgwriter:
        enabled: true
      cache:
        enabled: true
      checkpointer:
        enabled: true
      databases:
        enabled: true
      health:
        enabled: true
      io:
        enabled: true
      locks:
        enabled: true
      replication:
        enabled: true
      tablespaces:
        enabled: true
      version:
        enabled: true
      wal:
        enabled: true

  hostmetrics:
    collection_interval: 15s
    initial_delay: 1s
    scrapers:
      cpu:
      disk:
      filesystem:
      load:
      memory:
      network:
      paging:
      processes:

  filelog:
    include:
      - /var/log/postgresql/*.json
    start_at: end
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m
    operators:
      - type: json_parser
        parse_ints: true
        timestamp:
          parse_from: attributes.timestamp
          layout_type: strptime
          layout: '%Y-%m-%d %H:%M:%S.%L %Z'
        severity:
          parse_from: attributes.error_severity
          mapping:
            debug: [ DEBUG ]
            info:  [ INFO, NOTICE, LOG ]
            warn:  [ WARNING ]
            error: [ ERROR ]
            fatal: [ FATAL, PANIC ]
      - type: remove
        id: remove_timestamp
        field: attributes.timestamp

exporters:
  prometheus:
    endpoint: :8889
    send_timestamps: true

  otlphttp:
    endpoint: http://victoriametrics:8428/opentelemetry
    compression: gzip
    encoding: proto

  otlphttp/victorialogs:
    endpoint: http://victorialogs:9428/insert/opentelemetry
    compression: gzip
    encoding: proto

processors:
  memory_limiter/metrics:
    check_interval: 1s
    limit_mib: 512
  batch/metrics:
    send_batch_size: 8192
    timeout: 10s
  transform:
    metric_statements:
      - context: metric
        statements:
          - set(unit, "1") where unit == ""
  batch/logs:
    send_batch_size: 4096
    timeout: 15s
  resource:
    attributes:
      - key: service.name
        action: upsert
        value: postgresql
      - key: service.instance.id
        action: upsert
        value: postgres:5432
  attributes/convert:
    actions:
      - key: query_id
        action: convert
        converted_type: string
      - key: pid
        action: convert
        converted_type: string

service:
  telemetry:
    logs:
      level: info
      encoding: json
      output_paths: ["stderr"]
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    metrics:
      receivers:
        - postgrespro
        - hostmetrics
      processors:
        - memory_limiter/metrics
        - transform
        - batch/metrics
      exporters:
        - prometheus
        - otlphttp
    logs:
      receivers:
        - filelog
      processors:
        - resource
        - attributes/convert
        - batch/logs
      exporters:
        - otlphttp/victorialogs
