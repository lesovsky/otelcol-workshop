# Network
listen_addresses = '*'

# Logging configuration for workshop
log_destination = 'jsonlog'
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql'
log_file_mode = 0644
log_rotation_age = 0
log_rotation_size = 0

# Extended logging
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0

# Connection and authentication logging
log_connections = on
log_disconnections = on

# Statement logging (useful for workshop demo)
log_min_duration_statement = 500
log_statement = 'ddl'
